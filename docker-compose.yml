services:
  postgres:
    image: postgres:16-alpine
    container_name: dubai_lead_crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dubai_leads
      POSTGRES_PASSWORD: dubai_leads_password
      POSTGRES_DB: dubai_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dubai_leads -d dubai_leads"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
